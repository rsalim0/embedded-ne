# BENAX local broker config.
# The winget-installed Mosquitto *service* occupies port 1883 but only listens on
# localhost (and can't be reconfigured without admin), so our LAN-facing broker
# runs on 1884, bound to all interfaces so the ESP8266 can reach it over Wi-Fi.
listener 1884 0.0.0.0
allow_anonymous true
